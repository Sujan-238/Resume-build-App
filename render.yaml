services:
  - type: web
    name: resumeforge-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: RAZORPAY_KEY_ID
        sync: false # You will enter this in the Render dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false # You will enter this in the Render dashboard
